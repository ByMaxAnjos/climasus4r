      - sus_grid_prodes
      - sus_grid_join
      - sus_grid_pollution_merra2



  - title: "Analisis Espacial y Deteccion de Clusters"
    desc: "Autocorrelacion espacial (LISA), deteccion de clusters (Kulldorff), modelos Bayesianos CAR/BYM y regresion espacial (SAR/SEM)"
    contents:
      - sus_mod_spatial_weights
      - sus_mod_spatial_moran
      - sus_mod_spatial_scan
      - sus_mod_spatial_bayes
      - sus_mod_spatial_reg
      - sus_mod_spacetime_bayes
      - sus_mod_spacetime_exceedance
      - sus_mod_spacetime_predict
      - sus_mod_plot_spacetime
      - sus_mod_plot_spatial_moran
      - sus_mod_plot_spatial_scan
      - sus_mod_plot_spatial_bayes

  - title: "Calidad y Metadatos"
    desc: "Informes de calidad de datos y diccionarios de enfermedades"
    contents:
      - sus_data_quality_report
      - sus_data_ts_quality
      - print.climasus_ts_quality
      - summary.climasus_ts_quality
      - sus_census_select
      - sus_data_cid_select
      - sus_meta
      - sus_welcome
      - print.climasus_df
      - "[.climasus_df"
      - "[[.climasus_df"
      - "$<-.climasus_df"
      - rbind.climasus_df
      - as.data.frame.climasus_df
      - write_duckdb_climasus
      - write_parquet_climasus
      - sus_as_arrow
      - sus_as_duckdb


  - title: "Pipelines Analiticos Reproducibles (RAP)"
    desc: "Exportar, leer, inspeccionar, ejecutar y compartir pipelines como Reproducible Analytical Pipelines. Integracion con targets, GUI Shiny, recetas YAML y plantillas de proyecto."
    contents:
      - sus_rap_export
      - sus_rap_read
      - sus_rap_inspect
      - sus_rap_run
      - sus_rap_update
      - sus_rap_targets
      - sus_rap_make
      - sus_rap_recipe
      - sus_rap_from_recipe
      - sus_rap_template
      - sus_rap_gui

  - title: "AI y Gestión de Caché"
    desc: "Control del almacenamiento local de archivos descargados"
    contents:
      - sus_install_deps
      - sus_cache_clear
      - sus_cache_info
      - sus_chat

  - title: "Modelado DLNM"
    desc: "Ajuste y visualización de Modelos de Rezago Distribuido No Lineal (DLNM), que
      capturan simultáneamente la no linealidad y los efectos retardados de exposiciones
      ambientales (temperatura, contaminación del aire) sobre desenlaces de salud. Use
      estas funciones para estimar curvas exposición-respuesta y de rezago a partir de
      series temporales de mortalidad o morbilidad."
    contents:
      - sus_mod_dlnm
      - sus_mod_plot_dlnm

  - title: "Fracción y Número Atribuibles"
    desc: "Estimación de la Fracción Atribuible (FA%) y el Número Atribuible (NA) de desenlaces
      de salud debidos al calor, al frío o a su efecto combinado, con intervalos de
      confianza por bootstrap. Incluye análisis de riesgo en exceso bajo escenarios
      contrafactuales (p. ej., sin calentamiento adicional) y visualizaciones dedicadas
      para comunicar el impacto en salud pública."
    contents:
      - sus_mod_af
      - sus_mod_excess
      - sus_mod_plot_af

  - title: "Meta-análisis y Agrupación"
    desc: "Agrupación en dos etapas de ajustes DLNM por ciudad mediante mvmeta, produciendo
      curvas exposición-respuesta agrupadas y predicciones BLUP por ciudad. La
      metarregresión identifica covariables municipales (latitud, IDH, urbanización) que
      explican la heterogeneidad entre ciudades. Utilice este bloque para análisis
      multiciudad y estudios de vigilancia climático-epidemiológica a escala nacional."
    contents:
      - sus_mod_pool
      - sus_mod_metaregression
      - sus_mod_plot_pool

  - title: "Carga, Sensibilidad y Vulnerabilidad"
    desc: "Cuantificación de la carga de enfermedad atribuible al clima (NA, FA, desigualdad
      de Lorenz), análisis comparativo de sensibilidad entre estratos poblacionales y
      construcción del Índice de Vulnerabilidad IPCC de tres pilares (Exposición,
      Sensibilidad, Capacidad Adaptativa). Estas funciones convierten estimaciones
      epidemiológicas puntuales en indicadores de salud pública accionables para la
      planificación territorial y ambiental."
    contents:
      - sus_mod_burden
      - sus_mod_sensitivity
      - sus_mod_vulnerability_index
      - sus_mod_plot_burden
      - sus_mod_plot_sensitivity
      - sus_mod_plot_vulnerability

  - title: "Diseños Epidemiológicos"
    desc: "Implementaciones de diseños observacionales clásicos: el estudio caso-cruzado
      estratificado por tiempo (control intraindividual, ideal para exposiciones agudas
      de corto plazo) y el Análisis de Series de Tiempo Interrumpidas (ITS), que evalúa
      el efecto causal de intervenciones o políticas de salud sobre las tendencias
      temporales de los desenlaces."
    contents:
      - sus_mod_casecrossover
      - sus_mod_its

  - title: "Análisis SWOT Clima-Salud"
    desc: "Síntesis de objetos climasus ya procesados en un marco SWOT (Fortalezas,
      Debilidades, Oportunidades y Amenazas), con puntuaciones numéricas (0–100)
      y categóricas configurables por cuadrante, y visualizaciones radar, matriz
      y barras."
    contents:
      - sus_mod_swot
      - sus_mod_plot_swot

  - title: "Detección de Aglomerados Espaciales"
    desc: "Estadístico circular de exploración de Kulldorff para detectar aglomerados geográficos de exceso de casos. Identifica el aglomerado más probable y aglomerados secundarios significativos mediante prueba de hipótesis Monte Carlo, mapeando los resultados a códigos municipales."
    contents:
      - sus_mod_spatial_scan

  - title: "Machine Learning -  clima y salude"
    desc: "Modelado predictivo con XGBoost, con validación cruzada out-of-fold, ranking de
      importancia de características y diagnósticos gráficos (observado vs. predicho,
      curva de pérdida de CV, gráfico de importancia de variables). Use cuando el
      objetivo es pronosticar desenlaces de salud a partir de predictores climáticos y
      socioeconómicos, complementando el marco causal DLNM con capacidad predictiva de
      alta dimensión."
    contents:
      - sus_mod_ml
      - sus_mod_plot_ml

  - title: "Métodos S3 de Modelos"
    desc: >
      Métodos S3 exportados (print, summary, coef, vcov, tidy, predict) para todas las
      clases de salida del módulo de modelado (climasus_dlnm, climasus_af, climasus_pool,
      climasus_excess, climasus_casecrossover, climasus_its, climasus_sensitivity,
      climasus_metaregression, climasus_burden, climasus_vi, climasus_ml).
    contents:
      - matches("^(print|summary|coef|vcov|tidy|predict)\\.(climasus_dlnm|climasus_af|climasus_pool|climasus_excess|climasus_casecrossover|climasus_its|climasus_sensitivity|climasus_metaregression|climasus_burden|climasus_vi|climasus_ml|climasus_swot|climasus_spatial_scan|climasus_spatial_bayes|climasus_spatial_moran|climasus_spatial_reg|climasus_weights|climasus_spacetime_exceedance|climasus_spacetime_bayes|climasus_spacetime_pred)")

articles:
  - title: "Participa"
    contents:
      - contributing
  - title: "Tutoriales"
    contents:
      - tutorials
      - starts_with("rap-")

