url: https://bymaxanjos.github.io/climasus4r/es
lang: es

template:
  bootstrap: 5
  bslib:
    bg: "#f8fafc"
    fg: "#1e293b"
    primary: "#10b981"
    secondary: "#3b82f6"
    base_font:
      google: "Inter"
    code_font:
      google: "Fira Code"
  includes:
    in_header: |
      <link rel="stylesheet" href="pkgdown/assets/custom-modern.css">
      <link rel="icon" type="image/png" href="pkgdown/assets/favicon.png">

navbar:
  title: "climasus4r"
  left:
    - text: "Inicio"
      href: index.html
    - text: "Participa"
      href: articles/contributing.html
    - text: "Tutoriales"
      href: articles/tutorials.html
    - text: "Casos de Estudio"
      href: articles/case-studies.html
    - text: "Funcionalidades"
      href: reference/index.html
    - text: "Novidad"
      href: news/index.html
  
  right:
    - icon: fa-robot
      text: "Asistente IA"
      href: https://climasus4r.manus.space/
      target: "_blank"
    - icon: fa-github
      href: https://github.com/ByMaxAnjos/climasus4r
    - text: "Português"
      href: ../pt/index.html
    - text: "English"
      href: ../en/index.html

logo:
  src: inst/figures/logo.png
  alt: "climasus4r logo"

home:
  title: "climasus4r - Kit de Herramientas Integrado"
  description: "Paquete de R para el análisis integrado de datos de salud, clima y medio ambiente en Brasil."

reference:
  - title: "Importación y Exportación"
    desc: "Funciones principales para obtener, leer y guardar datos del DATASUS"
    contents:
      - sus_data_import
      - sus_data_read
      - sus_data_export

  - title: "Limpieza y Estandarización"
    desc: "Corrección de codificación, estandarización y creación de variables"
    contents:
      - sus_data_clean_encoding
      - sus_data_standardize
      - sus_data_create_variables

  - title: "Filtros y Selección"
    desc: "Filtrado por códigos CIE-10, grupos de enfermedades y demografía"
    contents:
      - sus_data_filter_cid
      - sus_data_filter_demographics

  - title: "Análisis y Datos Espaciales"
    desc: "Agregación de series temporales y unión con datos geográficos y demograficas"
    contents:
      - sus_data_aggregate
      - sus_spatial_join
      - sus_census_join
      - sus_climate_inmet
      - sus_climate_fill_inmet
      - sus_climate_aggregate
      - sus_climate_compute_indicators
      - sus_climate_plot_fill

  - title: "Calidad y Metadatos"
    desc: "Informes de calidad de datos y diccionarios de enfermedades"
    contents:
      - sus_data_quality_report
      - sus_census_select
      - sus_data_cid_select
      - sus_meta
      - print.climasus_df
      - "[.climasus_df"
      - "[[.climasus_df"
      - "$<-.climasus_df"
      - rbind.climasus_df
      - as.data.frame.climasus_df

  - title: "AI y Gestión de Caché"
    desc: "Control del almacenamiento local de archivos descargados"
    contents:
      - sus_cache_clear
      - sus_cache_info
      - sus_chat

articles:
  - title: "Participa"
    contents:
      - contributing
  - title: "Tutoriales"
    contents:
      - tutorials
