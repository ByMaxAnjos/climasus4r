home:
  title: "climasus4r - Integrated Analytics Toolkit"
  description: "R package for integrated analysis of health, climate, and environmental data in Brazil."

reference:
  - title: "Import & Export"
    desc: "Core functions to retrieve, read, and save DATASUS data"
    contents:
      - sus_data_import
      - sus_data_read
      - sus_data_export

  - title: "Cleaning & Standardization"
    desc: "Encoding fixes, column standardization, and feature engineering"
    contents:
      - sus_data_clean_encoding
      - sus_data_standardize
      - sus_data_create_variables

  - title: "Filtering & Selection"
    desc: "Filter by ICD-10 codes, disease groups, and demographics"
    contents:
      - sus_data_filter_cid
      - sus_data_filter_demographics

  - title: "Analysis & Spatial Data"
    desc: "Time series aggregation and spatial joins with Brazilian geography and demographic"
    contents:
      - sus_data_aggregate
      - sus_spatial_join
      - sus_census_join
      - sus_climate_inmet
      - sus_climate_fill_inmet
      - sus_climate_aggregate
      - sus_climate_compute_indicators
      - sus_climate_plot_fill
      - sus_climate_compute_heatwaves
      - sus_climate_plot_heatwaves
      - sus_climate_normals

  - title: "Quality & Metadata"
    desc: "Data quality reports and disease dictionaries"
    contents:
      - sus_data_quality_report
      - sus_census_select
      - sus_data_cid_select
      - sus_meta
      - print.climasus_df
      - "[.climasus_df"
      - "[[.climasus_df"
      - "$<-.climasus_df"
      - rbind.climasus_df
      - as.data.frame.climasus_df
      - write_duckdb_climasus
      - write_parquet_climasus
      - sus_climate_compute_heatwaves
      - sus_climate_plot_heatwaves
      - sus_as_arrow
      - sus_as_duckdb


  - title: "AI and Cache Management"
    desc: "Manage local storage of downloaded files"
    contents:
      - sus_cache_clear
      - sus_cache_info
      - sus_chat

  - title: "DLNM Modeling"
    desc: "Fit and visualize Distributed Lag Non-Linear Models (DLNM), which simultaneously
      capture the non-linearity and delayed effects of environmental exposures (temperature,
      air pollution) on health outcomes. Use these functions to estimate exposure-response
      and lag-response curves from time-series data on mortality or morbidity."
    contents:
      - sus_mod_dlnm
      - sus_mod_plot_dlnm

  - title: "Attributable Fraction & Number"
    desc: "Estimate the Attributable Fraction (AF%) and Attributable Number (AN) of health
      outcomes due to heat, cold, or their combined effect, with bootstrap confidence
      intervals. Includes excess-risk analysis under counterfactual scenarios (e.g., no
      additional warming) and dedicated visualizations for communicating public health
      impact to non-specialist audiences."
    contents:
      - sus_mod_af
      - sus_mod_excess
      - sus_mod_plot_af

  - title: "Pooled Meta-Analysis"
    desc: "Two-stage pooling of city-specific DLNM fits using mvmeta, producing pooled
      exposure-response curves and city-level Best Linear Unbiased Predictions (BLUPs).
      Meta-regression identifies municipal-level covariates (latitude, HDI, urbanization)
      that explain heterogeneity across cities. Use this block for multi-city analyses
      and national-scale climate-epidemiological surveillance studies."
    contents:
      - sus_mod_pool
      - sus_mod_metaregression
      - sus_mod_plot_pool

  - title: "Disease Burden, Sensitivity & Vulnerability"
    desc: "Quantify the climate-attributable disease burden (AN, AF, Lorenz inequality),
      perform comparative sensitivity analyses across population strata, and construct
      the IPCC three-pillar Vulnerability Index (Exposure, Sensitivity, Adaptive Capacity).
      These functions translate point epidemiological estimates into actionable public
      health indicators for territorial and environmental planning."
    contents:
      - sus_mod_burden
      - sus_mod_sensitivity
      - sus_mod_vulnerability_index
      - sus_mod_plot_burden
      - sus_mod_plot_sensitivity
      - sus_mod_plot_vulnerability

  - title: "Epidemiological Study Designs"
    desc: "Implementations of classic observational designs: the time-stratified case-crossover
      study (within-individual control, ideal for acute short-term exposures) and
      Interrupted Time Series (ITS) analysis, which evaluates the causal effect of
      health interventions or policy changes on temporal trends in health outcomes."
    contents:
      - sus_mod_casecrossover
      - sus_mod_its

  - title: "Climate Machine Learning"
    desc: "Predictive modeling with XGBoost, featuring out-of-fold cross-validation, feature
      importance ranking, and graphical diagnostics (observed vs. predicted, CV loss
      curve, variable importance chart). Use when the goal is forecasting health outcomes
      from climate and socioeconomic predictors, complementing the causal DLNM framework
      with high-dimensional predictive capacity."
    contents:
      - sus_mod_ml
      - sus_mod_plot_ml

articles:
  - title: "Get Involved"
    contents:
      - contributing
  - title: "Tutorials"
    contents:
