url: https://bymaxanjos.github.io/climasus4r/pt

template:
  bootstrap: 5
  bslib:
    bg: "#f8fafc"
    fg: "#1e293b"
    primary: "#10b981"
    secondary: "#3b82f6"
    base_font:
      google: "Inter"
    code_font:
      google: "Fira Code"
  includes:
    in_header: |
      <link rel="stylesheet" href="pkgdown/assets/custom-modern.css">
      <link rel="icon" type="image/png" href="pkgdown/assets/favicon.png">

navbar:
  title: "climasus4r"
  left:
    - text: "Início"
      href: index.html
    - text: "Participe"
      href: articles/contributing.html
    - text: "Tutoriais"
      href: articles/tutorials.html
    - text: "Estudos de Caso"
      href: articles/case-studies.html
    - text: "Funcionalidades"
      href: reference/index.html
    - text: "Novidades"
      href: news/index.html
  right:
    - icon: fa-robot
      text: "AI Assistant"
      href: https://climasus4r.manus.space/
      target: "_blank"
    - icon: fa-github
      href: https://github.com/ByMaxAnjos/climasus4r
    - text: "English"
      href: ../en/index.html
    - text: "Español"
      href: ../es/index.html

logo:
  src: inst/figures/logo.png
  alt: "climasus4r logo"

home:
  title: "climasus4r - Kit de Ferramentas Integrado"
  description: "Pacote R para análise de dados de saúde, clima e ambiente no Brasil"

reference:
  - title: "Importação e Exportação"
    desc: "Funções principais para obter, ler e salvar dados do DATASUS"
    contents:
      - sus_data_import
      - sus_data_read
      - sus_data_export

  - title: "Limpeza e Padronização"
    desc: "Tratamento de encoding, nomes de colunas e criação de variáveis"
    contents:
      - sus_data_clean_encoding
      - sus_data_standardize
      - sus_data_create_variables

  - title: "Filtros e Seleção"
    desc: "Filtragem por CID, grupos de doenças e demografia"
    contents:
      - sus_data_filter_cid
      - sus_data_filter_demographics

  - title: "Análise e Dados Espaciais"
    desc: "Agregação de séries temporais e junção com malhas geográficas e demograficas"
    contents:
      - sus_data_aggregate
      - sus_spatial_join
      - sus_census_join
      - sus_climate_inmet
      - sus_climate_fill_inmet

  - title: "Qualidade e Metadados"
    desc: "Relatórios de qualidade de dados e dicionários de doenças"
    contents:
      - sus_data_quality_report
      - sus_census_select
      - sus_data_cid_select
      - sus_meta
      - print.climasus_df
      - "[.climasus_df"
      - "[[.climasus_df"
      - "$<-.climasus_df"
      - rbind.climasus_df
      - as.data.frame.climasus_df

  - title: "AI e Gerenciamento de Cache"
    desc: "Controle do armazenamento local de arquivos baixados"
    contents:
      - sus_cache_clear
      - sus_cache_infor
      - sus_chat

articles:
  - title: "Participe"
    contents:
      - contributing
  - title: "Tutoriais"
    contents:
      - tutorials
      - tutorial_introducao
      - tutorial_estudos_casos
      
