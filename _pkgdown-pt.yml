      - sus_as_duckdb

  - title: "Pipelines Reprodutiveis (RAP)"
    desc: "Exportar, ler, inspecionar, executar e compartilhar pipelines como Reproducible Analytical Pipelines. Integracao com targets, GUI Shiny, receitas YAML e templates de projeto."
    contents:
      - sus_rap_export
      - sus_rap_read
      - sus_rap_inspect
      - sus_rap_run
      - sus_rap_update
      - sus_rap_targets
      - sus_rap_make
      - sus_rap_recipe
      - sus_rap_from_recipe
      - sus_rap_template
      - sus_rap_gui

  - title: "AI e Gerenciamento de Cache"
    desc: "Controle do armazenamento local de arquivos baixados"
    contents:
      - sus_install_deps
      - sus_cache_clear
      - sus_cache_info
      - sus_chat

  - title: "Modelagem DLNM"
    desc: "Ajuste e visualização de Modelos de Defasagem Distribuída Não-Linear (DLNM), que
      capturam simultaneamente a não-linearidade e os efeitos defasados de exposições
      ambientais (temperatura, poluição) sobre desfechos de saúde. Use estas funções
      para estimar curvas exposição-resposta e de defasagem a partir de dados de séries
      temporais de mortalidade ou morbidade."
    contents:
      - sus_mod_dlnm
      - sus_mod_plot_dlnm

  - title: "Fração e Número Atribuíveis"
    desc: "Estimativa da Fração Atribuível (FA%) e do Número Atribuível (NA) de desfechos
      de saúde devidos à exposição ao calor, ao frio ou ao total combinado, com intervalos
      de confiança por bootstrap. Inclui análise de excesso de risco sob cenários
      contrafactuais (e.g., sem aquecimento global) e visualizações dedicadas para
      comunicar o impacto em saúde pública."
    contents:
      - sus_mod_af
      - sus_mod_excess
      - sus_mod_plot_af

  - title: "Meta-análise e Agrupamento"
    desc: "Agrupamento em dois estágios de ajustes DLNM de múltiplas cidades usando mvmeta,
      produzindo curvas exposição-resposta pooled e BLUPs cidade a cidade. A meta-regressão
      permite identificar covariáveis de nível municipal (latitude, IDH, urbanização) que
      explicam a heterogeneidade entre cidades. Use este bloco para análises multicidade
      e estudos de vigilância climático-epidemiológica em escala nacional."
    contents:
      - sus_mod_pool
      - sus_mod_metaregression
      - sus_mod_plot_pool

  - title: "Carga, Sensibilidade e Vulnerabilidade"
    desc: "Quantificação da carga de doença atribuível ao clima (AN, FA, desigualdade de Lorenz),
      análise comparativa de sensibilidade entre estratos populacionais e construção do
      Índice de Vulnerabilidade IPCC baseado em três pilares (Exposição, Sensibilidade,
      Capacidade Adaptativa). Estas funções convertem estimativas epidemiológicas pontuais
      em indicadores de saúde pública acionáveis para planejamento territorial e ambiental."
    contents:
      - sus_mod_burden
      - sus_mod_sensitivity
      - sus_mod_vulnerability_index
      - sus_mod_plot_burden
      - sus_mod_plot_sensitivity
      - sus_mod_plot_vulnerability

  - title: "Desenhos Epidemiológicos"
    desc: "Implementações de desenhos observacionais clássicos: o caso-cruzado estratificado
      por tempo (controle interno do indivíduo, ideal para exposições agudas de curto prazo)
      e a Análise de Séries Temporais Interrompidas (ITS), que avalia o efeito causal de
      intervenções ou políticas de saúde sobre tendências temporais de desfechos." 
    contents:
      - sus_mod_casecrossover
      - sus_mod_its

  - title: "Análise SWOT Climático-Saúde"
    desc: "Síntese de objetos climasus já processados num quadro SWOT (Forças, Fraquezas, Oportunidades e Ameaças), com pontuações numéricas (0–100) e categóricas configuráveis por quadrante, e visualizações radar, matriz e barras."
    contents:
      - sus_mod_swot
      - sus_mod_plot_swot

  - title: "Detecção de Aglomerados Espaciais"
    desc: "Estatística circular de varredura de Kulldorff para detecção de aglomerados geográficos de excesso de casos. Identifica o aglomerado mais provável e aglomerados secundários significativos via teste de hipóteses Monte Carlo, com mapeamento dos códigos de município correspondentes."
    contents:
      - sus_mod_spatial_scan

  - title: "Machine Learning aplicado Clima e Saúde"
    desc: "Modelagem preditiva baseada em XGBoost com validação cruzada out-of-fold, importância
      de características e diagnóstico gráfico (observado vs. predito, curva de perda,
      importância das variáveis). Use quando o objetivo é previsão de desfechos de saúde
      a partir de preditores climáticos e socioeconômicos, complementando as abordagens
      causais do DLNM com capacidade preditiva de alta dimensão."
    contents:
      - sus_mod_ml
      - sus_mod_plot_ml

  - title: "Métodos S3 dos Modelos"
    desc: >
      Métodos S3 exportados (print, summary, coef, vcov, tidy, predict) para todas as
      classes de saída do módulo de modelagem (climasus_dlnm, climasus_af, climasus_pool,
      climasus_excess, climasus_casecrossover, climasus_its, climasus_sensitivity,
      climasus_metaregression, climasus_burden, climasus_vi, climasus_ml).
    contents:
      - matches("^(print|summary|coef|vcov|tidy|predict)\\.(climasus_dlnm|climasus_af|climasus_pool|climasus_excess|climasus_casecrossover|climasus_its|climasus_sensitivity|climasus_metaregression|climasus_burden|climasus_vi|climasus_ml|climasus_swot|climasus_spatial_scan|climasus_spatial_bayes|climasus_spatial_moran|climasus_spatial_reg|climasus_weights|climasus_spacetime_exceedance|climasus_spacetime_bayes|climasus_spacetime_pred)")

